<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon - Go Viral for 80% Less</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 30px rgba(6, 182, 212, 0.4), inset 0 0 30px rgba(6, 182, 212, 0.1);
            }
            50% {
                box-shadow: 0 0 50px rgba(6, 182, 212, 0.6), inset 0 0 30px rgba(6, 182, 212, 0.15);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Background Effects */
        .background-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
        }

        .orb-1 {
            top: 0;
            right: 0;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.2) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        .orb-2 {
            bottom: 0;
            left: 0;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite 1s;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #ffffff;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #06b6d4;
        }

        .cta-button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Hero Section */
        .hero {
            min-height: 72vh;
            padding: 2.5rem 2rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .hero-container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            justify-items: center;
        }

        .hero-content {
            animation: slideIn 0.8s ease-out;
            max-width: 100%;
            text-align: left;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.5);
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-size: clamp(2.6rem, 8vw, 4.5rem);
            line-height: 1.1;
            margin-bottom: 1rem;
            font-weight: 900;
        }

        .highlight {
            background: linear-gradient(to right, #06b6d4, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-description {
            font-size: 1.25rem;
            color: #d1d5db;
            margin-bottom: 1.5rem;
            line-height: 1.8;
            max-width: 500px;
        }

        .benefits {
            margin-bottom: 1.5rem;
        }

        .benefit {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .benefit-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .benefit-icon.cyan {
            background: linear-gradient(to right, #06b6d4, #3b82f6);
        }

        .benefit-icon.purple {
            background: linear-gradient(to right, #8b5cf6, #ec4899);
        }

        .benefit-icon.orange {
            background: linear-gradient(to right, #f97316, #eab308);
        }

        .benefit-text p:first-child {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .benefit-text p:last-child {
            font-size: 0.9rem;
            color: #9ca3af;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .primary-button {
            padding: 1.2rem 2.8rem;
            background: linear-gradient(135deg, #06b6d4, #0ea5e9, #3b82f6);
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: 900;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 30px rgba(6, 182, 212, 0.6),
                0 0 60px rgba(6, 182, 212, 0.4),
                0 10px 40px rgba(0, 0, 0, 0.3);
            animation: buttonPulse 2s ease-in-out infinite;
            letter-spacing: 0.5px;
            display: inline-block;
            text-decoration: none;
        }

        .primary-button:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 
                0 0 40px rgba(6, 182, 212, 0.8),
                0 0 80px rgba(6, 182, 212, 0.5),
                0 15px 50px rgba(0, 0, 0, 0.4);
            animation: none;
        }

        .primary-button:active {
            transform: translateY(-2px) scale(1.02);
        }

        @keyframes buttonPulse {
            0%, 100% {
                box-shadow: 
                    0 0 30px rgba(6, 182, 212, 0.6),
                    0 0 60px rgba(6, 182, 212, 0.4),
                    0 10px 40px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 
                    0 0 40px rgba(6, 182, 212, 0.8),
                    0 0 80px rgba(6, 182, 212, 0.6),
                    0 10px 40px rgba(0, 0, 0, 0.3);
            }
        }

        .secondary-button {
            padding: 0.8rem 1.8rem;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .secondary-button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(6, 182, 212, 0.5);
        }

        /* TikTok Phone Container */
        .phone-showcase {
            position: relative;
            height: 100%;
            min-height: 650px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: slideIn 1s ease-out;
            width: 100%;
            padding: 2rem 1rem;
            gap: 2rem;
        }

        .phone-badges {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
            padding: 3rem 3rem;
            z-index: 25;
        }

        .badge-side {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding: 0 2.5rem;
            justify-content: center;
            flex: 0 1 auto;
            max-width: 200px;
        }

        .badge-item {
            background: rgba(10, 10, 15, 0.85);
            border: 1.5px solid rgba(6, 182, 212, 0.4);
            border-radius: 1.3rem;
            padding: 1.6rem 1.4rem;
            text-align: center;
            backdrop-filter: blur(12px);
            animation: fadeInUp 0.8s ease-out;
            transition: all 0.3s ease;
            min-width: 160px;
            opacity: 1;
            position: relative;
            z-index: 25;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        .badge-item:hover {
            border-color: rgba(6, 182, 212, 0.7);
            background: rgba(10, 10, 15, 0.95);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(6, 182, 212, 0.2);
        }

        .badge-item-icon {
            font-size: 2.4rem;
            margin-bottom: 0.7rem;
            display: block;
        }

        .badge-item-text {
            font-size: 0.95rem;
            color: #d1d5db;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .badge-item-value {
            color: #06b6d4;
            font-weight: bold;
            font-size: 1.25rem;
            margin-top: 0.4rem;
            display: block;
        }

        .badge-item-subtext {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-top: 0.4rem;
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Phone Frame - TikTok Style */
        .phone-frame {
            position: relative;
            width: 260px;
            height: 520px;
            background: #000;
            border-radius: 38px;
            border: 9px solid #1a1a1a;
            box-shadow: 
                0 0 40px rgba(6, 182, 212, 0.6),
                0 0 80px rgba(6, 182, 212, 0.4),
                0 0 120px rgba(6, 182, 212, 0.2),
                0 25px 80px rgba(0, 0, 0, 0.9),
                inset 0 0 20px rgba(6, 182, 212, 0.1);
            overflow: hidden;
            animation: glow 3s ease-in-out infinite, float 4s ease-in-out infinite;
            z-index: 50;
            flex-shrink: 0;
        }

        /* Feature Panels */
        .feature-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            justify-content: center;
            flex: 0 1 250px;
            padding: 0 1.5rem;
        }

        .left-panel {
            align-items: flex-end;
            text-align: right;
            padding-right: 3rem;
        }

        .right-panel {
            align-items: flex-start;
            text-align: left;
            padding-left: 3rem;
        }

        .feature-box {
            background: rgba(6, 182, 212, 0.05);
            border-left: 3px solid rgba(6, 182, 212, 0.5);
            padding: 1.2rem 1.5rem;
            border-radius: 0.8rem;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        .right-panel .feature-box {
            border-left: none;
            border-right: 3px solid rgba(6, 182, 212, 0.5);
        }

        .feature-box:hover {
            background: rgba(6, 182, 212, 0.12);
            border-color: rgba(6, 182, 212, 0.8);
            transform: translateX(-4px);
        }

        .right-panel .feature-box:hover {
            transform: translateX(4px);
        }

        .feature-number {
            font-size: 1.6rem;
            font-weight: 900;
            color: #06b6d4;
            margin-bottom: 0.4rem;
        }

        .feature-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 0.3rem;
        }

        .feature-desc {
            font-size: 0.75rem;
            color: #9ca3af;
            line-height: 1.4;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 
                    0 0 40px rgba(6, 182, 212, 0.6),
                    0 0 80px rgba(6, 182, 212, 0.4),
                    0 0 120px rgba(6, 182, 212, 0.2),
                    0 25px 80px rgba(0, 0, 0, 0.9),
                    inset 0 0 20px rgba(6, 182, 212, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 50px rgba(6, 182, 212, 0.8),
                    0 0 100px rgba(6, 182, 212, 0.5),
                    0 0 150px rgba(6, 182, 212, 0.3),
                    0 25px 80px rgba(0, 0, 0, 0.9),
                    inset 0 0 20px rgba(6, 182, 212, 0.15);
            }
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 125px;
            height: 21px;
            background: #000;
            border-radius: 0 0 27px 27px;
            z-index: 20;
        }

        .phone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        /* TikTok Video Container */
        .tiktok-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            transition: opacity 0.6s ease-in-out;
            opacity: 0;
            pointer-events: none;
        }

        .tiktok-video.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Video Player */
        .video-player {
            flex: 1;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: local;
        }

        .video-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
        }

        .video-content::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--color1) 0%, var(--color2) 100%);
            opacity: 0;
        }

        .video-emoji {
            font-size: 50px;
            position: relative;
            z-index: 2;
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Video Overlay (TikTok UI) */
        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, transparent 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Bottom Info Section (TikTok Style) */
        .video-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 10px 8px 10px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        .info-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .creator-section {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            width: 100%;
            overflow: hidden;
            max-width: calc(100% - 55px);
        }

        .creator-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            border: 2px solid white;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 2px;
        }

        .creator-avatar:hover {
            transform: scale(1.1);
        }

        .creator-info {
            flex: 1;
            line-height: 1.1;
            min-width: 0;
            overflow: hidden;
        }

        .creator-name {
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .creator-name:hover {
            opacity: 0.8;
        }

        .video-title {
            font-size: 0.72rem;
            line-height: 1.1;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-hashtags {
            font-size: 0.65rem;
            color: #25f4ee;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-info {
            display: none;
        }

        .follow-btn {
            padding: 3px 12px;
            background: white;
            color: black;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            white-space: nowrap;
            margin-left: auto;
            align-self: center;
        }

        .follow-btn:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        /* Right Side Engagement Icons (TikTok) */
        .engagement-icons {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .engagement-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            font-size: 1.1rem;
            padding: 0;
        }

        .engagement-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .engagement-btn.liked {
            background: rgba(255, 0, 0, 0.2);
        }

        .engagement-count {
            font-size: 0.6rem;
            font-weight: 600;
            margin-top: 1px;
        }

        /* Sound Icon (TikTok) */
        .sound-icon {
            position: absolute;
            bottom: 8px;
            left: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            z-index: 6;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .sound-icon:hover {
            opacity: 0.7;
        }

        .sound-wave {
            display: flex;
            gap: 1px;
            align-items: flex-end;
        }

        .sound-bar {
            width: 1.5px;
            height: 8px;
            background: white;
            border-radius: 1px;
            animation: soundWave 0.6s ease-in-out infinite;
        }

        .sound-bar:nth-child(2) {
            animation-delay: 0.1s;
        }

        .sound-bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes soundWave {
            0%, 100% { height: 4px; }
            50% { height: 8px; }
        }

        /* Indicators */
        .phone-indicators {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 20;
        }

        .indicator {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .indicator.active {
            width: 24px;
            background: white;
            border-radius: 3px;
        }

        /* Sections */
        section {
            position: relative;
            z-index: 10;
        }

        .how-it-works {
            padding: 5rem 2rem 4rem;
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.5), black);
        }

        .section-title {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .section-title h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 0.8rem;
        }

        .section-title p {
            font-size: 1.25rem;
            color: #9ca3af;
        }

        .steps-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .market-insight {
            max-width: 1200px;
            margin: 0 auto 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .insight-card {
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            background: rgba(6, 182, 212, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-align: center;
        }

        .insight-card:hover {
            border-color: rgba(6, 182, 212, 0.6);
            background: rgba(6, 182, 212, 0.1);
            transform: translateY(-4px);
        }

        .insight-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .insight-card h3 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 0.8rem;
            color: #06b6d4;
        }

        .insight-card p {
            font-size: 0.95rem;
            color: #d1d5db;
            line-height: 1.7;
        }

        .step-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.02);
